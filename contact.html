<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact - Brew Haven</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Brew Haven</a>
        <div class="ms-auto">
            <a class="nav-link d-inline text-white" href="index.html">Home</a>
            <a class="nav-link d-inline text-white" href="menu.html">Menu</a>
            <a class="nav-link d-inline text-warning" href="contact.html">Contact</a>
        </div>
    </div>
</nav>

<!-- CONTACT SECTION -->
<section class="contact-section d-flex align-items-center">
    <div class="container">
        <div class="row shadow contact-box">

            <!-- LEFT SIDE -->
            <div class="col-md-6 contact-info text-white">
                <h2>Contact Us</h2>
                <p class="mt-3">
                    We'd love to hear from you. Visit us or send us a message.
                </p>

                <p class="mt-4">
                    📍 123 Coffee Street <br>
                    ☎ +1 000 000 0000 <br>
                    ✉ hello@brewhaven.com
                </p>
            </div>

            <!-- RIGHT SIDE FORM -->
            <div class="col-md-6 bg-white p-4">
                <form>
                    <div class="mb-3">
                        <label>Full Name</label>
                        <input type="text" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label>Message</label>
                        <textarea class="form-control" rows="4" required></textarea>
                    </div>

                    <button type="submit" class="btn btn-dark w-100">
                        Send Message
                    </button>
                </form>
            </div>

        </div>
    </div>
</section>

<footer class="text-center py-3 bg-dark text-white">
    © 2026 Brew Haven Coffee Shop
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
